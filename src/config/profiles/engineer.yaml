# 工程模板：默认关闭自动开火，保留观测与调参能力

camera:
  exposure: 2600

serial:
  device: "/dev/ttyUSB3"

auto_aim:
  enemy_color: "blue"

  cooldown_voter:
    auto_fire: false
    min_lock_frames: 8
    first_tolerance_rad: 0.05
    fire_tolerate_frames: 1

  shooter:
    enable_ballistic_compensation: false
    bullet_speed: 12.0
    gravity: 9.8

detector:
  light_thresh: 120
  green_thresh: 70
  white_thresh: 255
  max_light_angle: 60.0
  min_armor_ratio: 0.8
  max_armor_ratio: 5.5
  max_angle_diff: 30.0
  max_light_ratio: 1.0
  min_light_ratio: 0.04
  min_area: 10.0

debug:
  foxglove:
    port: 8768