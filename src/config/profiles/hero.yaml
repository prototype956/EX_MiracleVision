# 英雄模板：高弹速、较保守发射门限

camera:
  exposure: 1800

serial:
  device: "/dev/ttyUSB1"

auto_aim:
  enemy_color: "blue"

  cooldown_voter:
    auto_fire: true
    min_lock_frames: 5
    first_tolerance_rad: 0.035
    fire_tolerate_frames: 2

  shooter:
    enable_ballistic_compensation: true
    bullet_speed: 28.0
    gravity: 9.8

detector:
  light_thresh: 135
  green_thresh: 60
  white_thresh: 255
  max_light_angle: 55.0
  min_armor_ratio: 0.8
  max_armor_ratio: 5.0
  max_angle_diff: 25.0
  max_light_ratio: 0.95
  min_light_ratio: 0.05
  min_area: 14.0

debug:
  foxglove:
    port: 8766
